<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>保密刷题</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <p class="brand-kicker">题库训练</p>
        <h1 class="brand-title">保密知识刷题</h1>
      </div>
      <div class="topbar-actions">
        <button id="profileBtn" class="mode-btn" data-mode="profile" type="button">个人中心</button>
      </div>
    </header>

    <section class="stats-panel">
      <div class="stat-card">
        <span class="stat-label">当前</span>
        <strong id="progressText" class="stat-value">0 / 0</strong>
      </div>
      <button id="favCard" class="stat-card stat-card-btn" type="button" aria-label="进入收藏夹">
        <span class="stat-label">收藏</span>
        <strong id="favCount" class="stat-value">0</strong>
      </button>
      <button id="wrongCard" class="stat-card stat-card-btn" type="button" aria-label="进入错题集">
        <span class="stat-label">错题</span>
        <strong id="wrongCount" class="stat-value">0</strong>
      </button>
      <button id="masteredCard" class="stat-card stat-card-btn" type="button" aria-label="进入已会题集">
        <span class="stat-label">已会</span>
        <strong id="masteredCount" class="stat-value">0</strong>
      </button>
    </section>

    <nav class="mode-switch" aria-label="题目筛选">
      <button class="mode-btn tab-btn is-active" data-mode="all" type="button">全部</button>
      <button class="mode-btn tab-btn" data-mode="starred" type="button">可作答</button>
      <button class="mode-btn tab-btn" data-mode="unstarred" type="button">不可作答</button>
      <button id="startExamBtn" class="mode-btn tab-btn" type="button">模拟考试</button>
    </nav>

    <section id="questionCard" class="question-card">
      <div class="question-meta">
        <span id="qTag" class="q-tag">题目</span>
        <section id="allTools" class="all-tools" aria-label="题库模式工具">
          <div class="jump-group">
            <input id="jumpNumberInput" class="jump-input" type="number" min="1" placeholder="题号" />
            <button id="jumpNumberBtn" class="ghost-btn" type="button">跳转</button>
          </div>
          <button id="shuffleAllBtn" class="ghost-btn" type="button">开启乱序</button>
        </section>
        <span id="qNumber" class="q-number">#0</span>
      </div>
      <p id="qText" class="q-text">正在加载题库...</p>

      <div class="question-actions">
        <button id="favBtn" class="ghost-btn" type="button" aria-label="收藏当前题">☆ 收藏</button>
        <button id="masteredBtn" class="ghost-btn" type="button" aria-label="标记当前题已会">✓ 我会了！</button>
        <button id="removeWrongBtn" class="warn-btn" type="button">移出错题集</button>
      </div>

      <form id="answerForm" class="answer-form" autocomplete="off">
        <div id="inputsWrap" class="inputs-wrap"></div>
        <div class="answer-tools">
          <button id="submitBtn" class="primary-btn" type="submit">提交答案</button>
          <button id="toggleAnswerBtn" class="ghost-btn" type="button">显示答案</button>
        </div>
      </form>

      <p id="answerKey" class="answer-key"></p>

      <p id="feedback" class="feedback" aria-live="polite"></p>
    </section>

    <section id="profilePanel" class="profile-panel"></section>

    <footer id="actionsBar" class="actions">
      <button id="prevBtn" class="ghost-btn" type="button">上一题</button>
      <button id="nextBtn" class="primary-btn" type="button">下一题</button>
      <button id="exitExamBtn" class="warn-btn" type="button">提前退出并结算</button>
    </footer>
  </main>

  <script src="bm-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
